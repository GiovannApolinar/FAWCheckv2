plugins {
    id 'com.android.application'
}

def configuredWebAppUrl = (project.findProperty('webAppUrl') ?: 'http://10.0.2.2:3000').toString()
def escapedWebAppUrl = configuredWebAppUrl.replace('\\', '\\\\').replace('"', '\\"')

android {
    namespace 'com.maizedrs.fawcheck'
    compileSdk 34

    defaultConfig {
        applicationId 'com.maizedrs.fawcheck'
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '0.1.0'
        buildConfigField 'String', 'WEB_APP_URL', "\"${escapedWebAppUrl}\""
    }
}

dependencies {
    implementation 'androidx.core:core:1.10.1'
}
